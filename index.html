<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1e40af">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="stylesheet" href="styles.css">
    <title>Login - Plênio PWA</title>
</head>
<body>
    <div class="app-shell login-page">
        <main class="login-container">
            <button id="btn-back" class="btn-back">← Voltar</button>
            
            <div class="login-content">
                <div class="login-header">
                    <div class="logo-medium">📱</div>
                    <h1>Faça Login</h1>
                </div>

                <form id="login-form" class="login-form">
                    <div class="form-group">
                        <label for="rm">RM</label>
                        <input type="text" id="rm" name="rm" placeholder="Digite seu RM" required>
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                    </div>
                    <button type="submit" class="btn-submit">Entrar</button>
                </form>
            </div>

            <footer class="login-footer">Abra este site no navegador e instale no PC ou no celular para usar como app.</footer>
        </main>
    </div>
    <div id="snackbar" class="snackbar"></div>
    <script src="main.js"></script>
</body>
</html>
