<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1e40af">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="stylesheet" href="styles.css">
    <title>Plênio PWA</title>
</head>
<body>
    <div class="app-shell">



        <main style="max-width:320px;margin:auto;padding:1em 0;">
            <form id="login-form" style="display:flex;flex-direction:column;gap:0.75em;">
                <input type="text" id="rm" name="rm" placeholder="RM" required style="padding:0.5em;font-size:1em;">
                <input type="password" id="senha" name="senha" placeholder="Senha" required style="padding:0.5em;font-size:1em;">
                <button type="submit" style="padding:0.5em;font-size:1em;cursor:pointer;">Entrar</button>
            </form>
        </main>

        <footer>Abra este site no navegador e instale no PC ou no celular para usar como app.</footer>
    </div>
    <div id="snackbar" class="snackbar"></div>
    <script src="main.js"></script>
</body>
</html>
