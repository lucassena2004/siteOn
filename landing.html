<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1e40af">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="stylesheet" href="styles.css">
    <title>Bem-vindo - Plênio PWA</title>
</head>
<body>
    <div class="app-shell landing-page">
        <main class="landing-container">
            <div class="landing-content">
                <div class="landing-header">
                    <div class="logo-large">📱</div>
                    <h1>Plênio</h1>
                    <p class="landing-subtitle">Sua solução educacional</p>
                </div>

                <div class="landing-features">
                    <div class="feature-item">
                        <span class="feature-icon">📚</span>
                        <h3>Conteúdo</h3>
                        <p>Acesso a materiais e recursos educacionais</p>
                    </div>
                    <div class="feature-item">
                        <span class="feature-icon">📊</span>
                        <h3>Progresso</h3>
                        <p>Acompanhe seu desempenho</p>
                    </div>
                    <div class="feature-item">
                        <span class="feature-icon">🔔</span>
                        <h3>Notificações</h3>
                        <p>Receba atualizações importantes</p>
                    </div>
                </div>

                <div class="landing-cta">
                    <button id="btn-login" class="btn-primary">Entrar</button>
                    <button id="btn-info" class="btn-secondary">Saiba Mais</button>
                </div>

                <p class="landing-footer">Instale no seu PC ou celular para usar como app</p>
            </div>
        </main>
    </div>
    <div id="snackbar" class="snackbar"></div>
    <script src="main.js"></script>
</body>
</html>
